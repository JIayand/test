name: Build Windows EXE

on:
  push:
    branches:
      - main # 监听 main 分支的推送
  workflow_dispatch: # 允许手动点击运行

jobs:
  build:
    runs-on: windows-latest

    steps:
      # 1. 拉取代码
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. 安装 Python
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      # 3. 安装依赖 (PyInstaller)
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller

      # 4. 打包程序 (关键步骤)
      - name: Run PyInstaller
        run: |
          # 这里假设你的主程序文件叫 main.py
          # 如果你的文件叫别的名字（比如 app.py），请把下面的 main.py 改掉
          pyinstaller --onefile --noconsole test.py

      # 5. 上传产物 (修复了 path 报错)
      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: my-app-exe
          path: dist/  # <--- 这里指定了上传 dist 文件夹
