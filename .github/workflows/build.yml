name: Build Windows EXE

on:
  push:
    branches:
      - main # 监听 main 分支的推送
  workflow_dispatch: # 允许手动点击运行

jobs:
  build:
    runs-on: windows-latest

    steps:
      # 1. 拉取代码
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. 安装 Python
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11' # 指定具体版本，避免 '3.x' 浮动

      # 3. 安装依赖 (PyInstaller)
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller

      # 4. 打包程序 (关键步骤)
      - name: Run PyInstaller
        run: |
          # 确保文件名和你的实际主程序一致（比如 main.py / app.py）
          pyinstaller --onefile test.py

      # 5. 上传产物 (修复 path 报错 + 优化语法)
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: my-app-exe
          # 重点：确保 path 缩进在 with 下面，且路径正确
          path: |
            dist/*.exe
            # 可选：如果需要保留 build 文件夹的日志
            build/
